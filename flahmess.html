<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        .erro{
            background-color: #ffb3b3;
            color: darkred;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            width: 300px;
        }
        
        .sucesso{
            background-color: #b6ffb3;
            color: darkgreen;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            width: 300px;
        }
    </style>
<body>
    <h2>cadastro de usuario</h2>

    {% with mensagens = get_flahed_messages(with_categoriestrue) %}
       {% if mensagens %}
          {% for categoria,  mensagem in mensagens %}
            <p>
                <strong> {{ categoria }}:</strong>{{ mensagem}}
            </p>
        {% endfor %}
    {%endif}
   {%endwith%}

   <form action="{{ url_for('cadastro') }}"  method="post">
    <label> nome:</label><br>
    <input type="text" name="nome"><br><br>

    <button type="submit">cadastrar</button>
   ></form>
    
</body>
</html>
